[project]
name = "aippt-builder"
version = "0.1.0"
description = "Deterministic SJTU PPTX builder for AIPPT"
requires-python = ">=3.11"
dependencies = [
  "jsonschema>=4.0.0",
  "lxml>=5.0.0",
  "markdown-it-py>=3.0.0",
  "pillow>=10.0.0",
  "pydantic>=2.0.0",
  "python-pptx>=1.0.0",
  "pyyaml>=6.0.0",
  "regex>=2024.0.0",
  "rich>=13.0.0",
]

[project.scripts]
aippt-build = "aippt_builder.cli:main"

[tool.ruff]
line-length = 100

